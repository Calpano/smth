name: Build .mcpb bundle

on:
  push:
    tags: ['v*']
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

jobs:
  bundle:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4 (hash-pinned for security)

      - name: Build smth.mcpb bundle
        run: |
          rm -f smth.mcpb
          zip -r smth.mcpb \
            src/ \
            manifest.json \
            package.json \
            package-lock.json \
            LICENSE

      - name: Upload bundle as artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4 (hash-pinned for security)
        with:
          name: smth-mcpb
          path: smth.mcpb

      - name: Create release and attach bundle
        if: github.event_name == 'push'
        uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe # v2 (hash-pinned for security)
        with:
          files: smth.mcpb
          generate_release_notes: true
