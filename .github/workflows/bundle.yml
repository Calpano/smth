name: Build .mcpb bundle

on:
  push:
    tags: ['v*']
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

jobs:
  bundle:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v4 (hash-pinned for security)

      - name: Build smth.mcpb bundle
        run: |
          rm -f smth.mcpb
          zip -r smth.mcpb \
            src/ \
            manifest.json \
            package.json \
            package-lock.json \
            LICENSE

      - name: Upload bundle as artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v4 (hash-pinned for security)
        with:
          name: smth-mcpb
          path: smth.mcpb

      - name: Create release and attach bundle
        if: github.event_name == 'push'
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v2 (hash-pinned for security)
        with:
          files: smth.mcpb
          generate_release_notes: true
